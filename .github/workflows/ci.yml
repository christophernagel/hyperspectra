name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with flake8
        run: |
          # Stop build on syntax errors or undefined names
          flake8 aviris_tools/ hsi_toolkit/ --count --select=E9,F63,F7,F82 --show-source --statistics
          # Warn on everything else (non-blocking)
          flake8 aviris_tools/ hsi_toolkit/ --count --exit-zero --max-line-length=100 --statistics

      - name: Run tests with coverage
        run: |
          pytest --cov=aviris_tools --cov=hsi_toolkit --cov-report=term-missing --cov-report=xml

      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
